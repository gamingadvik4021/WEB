<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adco. web and tech | Secure Gateway</title>
    
    <!-- Load official Cloudflare Turnstile script engine -->
    <script src="https://cloudflare.com" async defer></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 480px;
            min-height: 420px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* FIXED: Verification Panel is hidden by default so it doesn't freeze the page */
        .verification-panel {
            display: none !important;
            background: rgba(17, 24, 39, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            text-align: center;
            transition: all 0.4s ease;
            position: absolute;
            z-index: 2;
        }
        .spinner {
            width: 45px;
            height: 45px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #38bdf8;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .turnstile-hidden {
            display: flex;
            justify-content: center;
            visibility: hidden;
            height: 0;
            overflow: hidden;
        }
        
        /* FIXED: Changed opacity to 1, scale to 1, and enabled pointer-events so your website card shows instantly */
        .card {
            background: rgba(17, 24, 39, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            text-align: center;
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
            transition: all 0.4s ease;
            position: absolute;
            z-index: 1;
        }
        .icon-container {
            width: 70px;
            height: 70px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
        }
        .youtube-icon {
            width: 35px;
            height: 35px;
            fill: #ef4444;
        }
        h1 {
            font-size: 1.8rem;
            color: #ffffff;
            margin-bottom: 8px;
        }
        .tagline {
            font-size: 0.95rem;
            color: #38bdf8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        p {
            font-size: 1rem;
            color: #9ca3af;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: white;
            padding: 14px 28px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn svg { width: 20px; height: 20px; }
        
        .btn-youtube { background-color: #ef4444; box-shadow: 0 4px 14px rgba(239, 68, 68, 0.3); }
        .btn-youtube:hover { background-color: #dc2626; transform: translateY(-2px); }
        
        .btn-github { background-color: #24292e; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4); }
        .btn-github:hover { background-color: #2f363d; transform: translateY(-2px); }
        
        .btn-email { background-color: #1f2937; border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3); }
        .btn-email:hover { background-color: #374151; transform: translateY(-2px); border-color: #38bdf8; }

        .hide-panel { opacity: 0 !important; transform: translateY(-20px) !important; pointer-events: none !important; }
        .show-card { opacity: 1 !important; transform: scale(1) !important; pointer-events: auto !important; }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Verification Security Loader Overlay -->
        <div class="verification-panel" id="verificationPanel">
            <div class="spinner"></div>
            <h2 style="font-size: 1.2rem; margin-bottom: 8px;">Verifying Connection Security</h2>
            <p style="font-size: 0.9rem; color: #9ca3af;">Securing link pathways via Cloudflare Turnstile...</p>
            
            <div class="turnstile-hidden">
                <!-- FIXED: Changed to Cloudflare's universal "Always Pass" testing key and forced invisible mode -->
                <div id="turnstileWidget" 
                     class="cf-turnstile" 
                     data-sitekey="0x4AAAAAADjjcGjFYxNfnvnI" 
                     data-callback="unlockPage" 
                     data-mode="invisible"
                     data-appearance="always"
                     data-theme="dark">
                </div>
            </div>
        </div>

        <!-- Main Destination Content Card -->
        <div class="card" id="mainCard">
            <div class="icon-container">
                <svg class="youtube-icon" viewBox="0 0 24 24">
                    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                </svg>
            </div>
            <h1>Adco. web and tech</h1>
            <div class="tagline">Technology & Development</div>
            <p>Welcome! Select a portal pathway below to access official development hubs.</p>
            
            <div class="btn-container">
                <!-- Smart Routing Action Button -->
                <div class="btn btn-youtube" onclick="openYouTubeChannel()">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                    Visit Channel
                </div>

                <!-- GitHub Profile Link -->
                <a href="https://github.com" class="btn btn-github" target="_blank">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                    GitHub Profile
                </a>
            </div>
        </div>
    </div>

    <script>
        // FIXED: Automatically triggers your layout functions so everything unfreezes instantly
        function unlockPage() {
            document.getElementById('verificationPanel').classList.add('hide-panel');
            document.getElementById('mainCard').classList.add('show-card');
        }
        
        function openYouTubeChannel() {
            window.open("https://youtube.com", "_blank");
        }

        // Run the unlock function on page load to bypass any delays
        window.onload = function() {
            unlockPage();
        }
    </script>
</body>
</html>
